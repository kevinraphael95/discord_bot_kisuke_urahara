<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quel Tome ? — Bleach Manga Guesser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&family=Noto+Serif+JP:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/chapitre.css">
<script src="js/nav.js" defer></script>
</head>
<body>
<div class="atmo"></div>
<div class="top-bar"></div>
<div class="gwrap">
  <div class="page-title">Quel Tome ? <span>Bleach Manga Guesser</span></div>
  <p class="psub">Devine de quel tome vient cette page.</p>
  <div class="scorebar">
    <span class="sitem"><span id="sScore">0</span> pts</span>
    <span class="sep">·</span>
    <span class="sitem">Série <span id="sStreak">0</span> 🔥</span>
    <span class="sep">·</span>
    <span class="sitem">Record <span id="sBest">0</span></span>
    <span class="sep">·</span>
    <span class="sitem">Manche <span id="sRound">0</span></span>
  </div>
  <div id="loadBox">
    <div class="spinner"></div>
    <div id="loadMsg">Chargement…</div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
  </div>
  <div id="errorBox" style="display:none;">
    <div id="errMsg">Impossible de charger. Vérifie ta connexion.</div>
    <button class="btn btn-ghost" onclick="newRound()">🔄 Réessayer</button>
  </div>
  <div id="imgBox" style="display:none;">
    <img id="mangaImg" alt="Page de Bleach"/>
    <div class="img-src">📖 SushiScan · Bleach</div>
  </div>
  <div class="tries-row" id="triesRow"></div>
  <div id="inputBox" style="display:none;">
    <div class="input-row">
      <input type="number" id="chapInput" placeholder="Tome (1 – 74)" min="1" max="74" onkeydown="if(event.key==='Enter') submit()"/>
      <button class="btn btn-gold" onclick="submit()">Valider</button>
    </div>
  </div>
  <div id="histBox"></div>
  <div id="result" style="display:none;">
    <div class="res-title" id="resTtl"></div>
    <div class="res-chap" id="resChap"></div>
    <button class="btn btn-gold" onclick="newRound()">▶ Prochaine page</button>
  </div>
</div>
<script src="js/chapitre.js"></script>
</body>
</html>
