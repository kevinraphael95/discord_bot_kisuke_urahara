<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archives Secrètes — Kisuke</title>
<link rel="stylesheet" href="css/base.css">
<script src="js/nav.js" defer></script>
<style>
  .scans-wrap { max-width: 860px; margin: 90px auto 4rem; padding: 0 1rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }
  .scans-title { font-family:'Shippori Mincho',serif; font-size:1.8rem; color:var(--ko-tx); text-align:center; letter-spacing:.1em; }
  .scans-tabs { display:flex; gap:2px; width:100%; }
  .stab { flex:1; background:var(--panel); border:1px solid var(--border); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:.7rem; cursor:pointer; transition:all .2s; }
  .stab.active { background:var(--ko-bg); border-color:var(--ko-bd); color:var(--ko-tx); }
  .reader { width:100%; display:flex; flex-direction:column; align-items:center; gap:.8rem; }
  .reader img { max-width:100%; display:block; border:1px solid var(--border); }
  .nav-btns { display:flex; gap:.5rem; align-items:center; }
  .nbtn { background:var(--panel); border:1px solid var(--border); color:var(--text); font-family:'DM Sans',sans-serif; font-size:.8rem; font-weight:600; padding:.6rem 1.4rem; cursor:pointer; transition:all .2s; }
  .nbtn:hover:not(:disabled) { border-color:var(--ko-bd); color:var(--ko-tx); }
  .nbtn:disabled { opacity:.3; cursor:not-allowed; }
  .page-info { font-size:.78rem; color:var(--muted); min-width:80px; text-align:center; }
  .loading { color:var(--muted); font-size:.85rem; }
</style>
</head>
<body>
<div class="atmo"></div>
<div class="top-bar"></div>

<div class="scans-wrap">
  <div class="scans-title">☠ ARCHIVES SECRÈTES ☠</div>

  <div class="scans-tabs">
    <button class="stab active" onclick="loadScan('no_breath_from_hell',this)">No Breathes From Hell</button>
    <button class="stab" onclick="loadScan('pilote',this)">Pilote</button>
    <button class="stab" onclick="loadScan('jet2',this)">Artbook</button>
  </div>

  <div class="reader" id="reader">
    <div class="loading">Chargement…</div>
  </div>
</div>

<script>
const REPO = 'kevinraphael95/discord_bot_kisuke_urahara';
const BRANCH = 'wip';
const BASE = 'data/images/scans';
const RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/`;

let pages = [];
let cur = 0;

async function loadScan(folder, btn) {
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const reader = document.getElementById('reader');
  reader.innerHTML = '<div class="loading">Chargement…</div>';
  pages = [];
  cur = 0;

  const url = `https://api.github.com/repos/${REPO}/contents/${BASE}/${folder}?ref=${BRANCH}`;
  const res = await fetch(url);
  const files = await res.json();
  pages = files
    .filter(f => f.type === 'file')
    .sort((a,b) => a.name.localeCompare(b.name))
    .map(f => RAW + f.path);

  showPage();
}

function showPage() {
  const reader = document.getElementById('reader');
  reader.innerHTML = `
    <div class="nav-btns">
      <button class="nbtn" id="btnPrev" onclick="go(-1)">◀ Précédent</button>
      <span class="page-info" id="pinfo">${cur+1} / ${pages.length}</span>
      <button class="nbtn" id="btnNext" onclick="go(1)">Suivant ▶</button>
    </div>
    <img id="scanImg" src="${pages[cur]}" alt="page ${cur+1}">
    <div class="nav-btns">
      <button class="nbtn" id="btnPrev2" onclick="go(-1)">◀ Précédent</button>
      <span class="page-info">${cur+1} / ${pages.length}</span>
      <button class="nbtn" id="btnNext2" onclick="go(1)">Suivant ▶</button>
    </div>
  `;
  updateBtns();
}

function go(dir) {
  cur = Math.max(0, Math.min(pages.length-1, cur+dir));
  document.getElementById('scanImg').src = pages[cur];
  document.getElementById('pinfo').textContent = `${cur+1} / ${pages.length}`;
  updateBtns();
  window.scrollTo({top: document.querySelector('.scans-tabs').offsetTop - 100, behavior:'smooth'});
}

function updateBtns() {
  ['btnPrev','btnPrev2'].forEach(id => document.getElementById(id).disabled = cur === 0);
  ['btnNext','btnNext2'].forEach(id => document.getElementById(id).disabled = cur === pages.length-1);
}

// Clavier
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  go(-1);
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'Escape') history.back();
});

// Charger le premier onglet au démarrage
document.querySelector('.stab').click();
</script>
</body>
</html>
