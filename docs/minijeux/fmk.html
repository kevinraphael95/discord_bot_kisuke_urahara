<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuck, Marry, Kill — Bleach Manga Guesser</title>
<script>const t=localStorage.getItem('shinigami-theme');document.documentElement.setAttribute('data-theme',['shinigami','quincy'].includes(t)?t:'shinigami');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="fmk.css">
<script src="../js/nav.js" defer></script>
<script src="../js/data.js"></script>
<script src="fmk.js"></script>
</head>
<body>
<div class="atmo"></div>
<div class="top-bar"></div>
<div class="phdr">
  <h1 class="pttl">
    <span class="t1"><strong>Fuck, Marry, Kill</strong></span>
  </h1>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>
<div class="tl-wrap">
  <div id="gameBox">
    <div class="cards-container" id="fmk-zone"></div>
    <div class="btn-row">
      <button class="btn-choice before" id="btn-valider" onclick="validerChoix()" style="display: none;">
        <span class="bc-icon">💥</span>
        <span>Valider</span>
      </button>
      <button class="btn-choice after" onclick="genererTrio()">
        <span class="bc-icon">▶▶</span>
        <span>Suivant</span>
      </button>
    </div>
  </div>
  <div id="resultBox" style="display: none;">
    <div style="display:flex; align-items:center; gap:.5rem; justify-content:center;">
      <span class="res-emoji">🎯</span>
      <span class="res-title">Choix Enregistrés !</span>
    </div>
    <div class="res-info" id="fmkSummary"></div>
    <button class="btn btn-gold" onclick="document.getElementById('resultBox').style.display='none'; document.getElementById('gameBox').style.display='block'; genererTrio();">▶ Rejouer</button>
  </div>
</div>
</body>
</html>
