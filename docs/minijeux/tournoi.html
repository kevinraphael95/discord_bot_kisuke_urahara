<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bracket Tournament — Bleach</title>

<script>
const t = localStorage.getItem('shinigami-theme');
document.documentElement.setAttribute(
  'data-theme',
  ['shinigami','quincy'].includes(t) ? t : 'shinigami'
);
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="tournoi.css">

<script src="../js/nav.js" defer></script>
<script src="../js/data.js"></script>
<script src="tournoi.js" defer></script>

</head>

<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1"><strong>Bracket Tournament</strong></span>
  </h1>
  <div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
</div>

<div class="tl-wrap">

  <div id="gameBox">

    <!-- ⚔️ MATCH AREA -->
    <div id="matchZone" class="cards-container"></div>

    <!-- CONTROLS -->
    <div class="btn-row">
      <button class="btn-choice before" onclick="startTournament()">
        <span class="bc-icon">🔄</span>
        <span>Restart</span>
      </button>
    </div>

  </div>

  <!-- 🏆 RESULT -->
  <div id="resultBox" style="display:none;">

    <div style="display:flex; align-items:center; gap:.5rem; justify-content:center;">
      <span class="res-emoji">🏆</span>
      <span class="res-title">Winner</span>
    </div>

    <div id="winnerDisplay"></div>

    <div class="btn-row">
      <button class="btn-choice after" onclick="startTournament()">
        <span class="bc-icon">▶▶</span>
        <span>Rejouer</span>
      </button>
    </div>

  </div>

</div>

</body>
</html>
