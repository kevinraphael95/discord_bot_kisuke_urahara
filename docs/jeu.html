<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Guess — Bleach</title>

<link rel="stylesheet" href="css/base.css">

<style>
.pg-wrap { max-width:900px;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem; }
.canvas-card { border:1px solid var(--gold-line); background:#000; padding:.5rem; }
canvas { width:100%; max-height:420px; display:block; }

.input-row { display:flex; gap:.5rem; position:relative; }

#guessInput {
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:.6rem;
}

/* AUTOCOMPLETE */
.autocomplete {
  position:absolute;
  top:100%;
  left:0;
  right:60px;
  background:var(--panel);
  border:1px solid var(--gold-line);
  max-height:220px;
  overflow-y:auto;
  z-index:10;
  display:none;
}

.ac-item { padding:.55rem .7rem; cursor:pointer; }
.ac-item:hover, .ac-item.active {
  background:rgba(201,168,76,.12);
  color:var(--gold);
}

.ac-highlight { color:var(--gold); font-weight:bold; }

.hint { text-align:center; font-size:.8rem; color:var(--muted); min-height:18px; }

.btn-row { display:grid; grid-template-columns:1fr auto auto; gap:.5rem; }

.sstat {
  background:var(--panel);
  border:1px solid var(--gold-line);
  padding:.45rem;
  text-align:center;
}

.sv { color:var(--gold); font-weight:bold; }
.sl { font-size:.6rem; color:var(--muted); }

#resultBox { display:none; text-align:center; }
</style>
</head>

<body>

<div class="pg-wrap">

<div id="loadBox">Chargement…</div>

<div id="gameBox" style="display:none;">
  <div class="canvas-card">
    <canvas id="canvas" width="400" height="400"></canvas>
  </div>

  <div class="input-row">
    <input id="guessInput" autocomplete="off" placeholder="Nom du personnage..." />
    <button onclick="submit()">Valider</button>
    <div id="autocompleteBox" class="autocomplete"></div>
  </div>

  <div id="hintBox" class="hint"></div>

  <div class="btn-row">
    <div class="sstat"><span id="sStreak">0</span><div class="sl">🔥</div></div>
    <div class="sstat"><span id="sBest">0</span><div class="sl">Record</div></div>
    <div class="sstat"><span id="sLevel">0</span><div class="sl">Pixel</div></div>
  </div>
</div>

<div id="resultBox">
  <h2>💀 Perdu</h2>
  <div id="resText"></div>
  <button onclick="restart()">Rejouer</button>
</div>

</div>

<script>
const API_URL = "https://raw.githubusercontent.com/ashishk1331/bleach-api/master/data/humans.json";

const FALLBACK = [
  { name: "Ichigo Kurosaki", image: "https://i.imgur.com/3ZQ3Z4P.png" }
];

const LEVELS = [6,10,16,24,36,64];

let characters = [];
let used = new Set();
let allNames = [];

let current, img;
let level = 0;
let streak = 0, best = 0;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* ================= INIT ================= */
window.onload = async () => {
  const save = JSON.parse(localStorage.getItem("pixel_bleach"));
  if (save) best = save.best || 0;

  await loadCharacters();
  initAutocomplete();

  updateStats();
  startGame();

  document.getElementById("guessInput").addEventListener("keydown", e => {
    if (e.key === "Enter") submit();
  });
};

/* ================= LOAD ================= */
async function loadCharacters() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    characters = data
      .filter(c => c.avatar && c.avatar.length)
      .map(c => ({
        name: c.name.english,
        image: c.avatar[Math.floor(Math.random()*c.avatar.length)],
        hints: generateHints(c.name.english)
      }));

    allNames = characters.map(c => c.name);

    if (!characters.length) throw "empty";

  } catch {
    characters = FALLBACK;
    allNames = FALLBACK.map(c => c.name);
  }
}

/* ================= GAME ================= */
function startGame() {
  if (!characters.length) return;

  document.getElementById("loadBox").style.display = "block";
  document.getElementById("gameBox").style.display = "none";

  const pool = characters.filter(c => !used.has(c.name));
  if (!pool.length) used.clear();

  current = pool[Math.floor(Math.random() * pool.length)];
  if (!current) return startGame();

  used.add(current.name);
  level = 0;

  preload(current.image).then(im => {
    img = im;
    draw();
    document.getElementById("hintBox").textContent = "";
    document.getElementById("loadBox").style.display = "none";
    document.getElementById("gameBox").style.display = "block";
  }).catch(() => startGame());
}

/* ================= IMAGE ================= */
function preload(src){
  return new Promise((res,rej)=>{
    const i=new Image();
    i.crossOrigin="Anonymous";
    i.onload=()=>res(i);
    i.onerror=rej;
    i.src=src;
  });
}

/* ================= DRAW ================= */
function draw(){
  const size = LEVELS[level];
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(img,0,0,size,size);
  ctx.drawImage(canvas,0,0,size,size,0,0,canvas.width,canvas.height);

  document.getElementById("sLevel").textContent=size+"x"+size;
}

/* ================= INPUT ================= */
function submit(){
  const val = normalize(document.getElementById("guessInput").value);
  if(!val) return;

  if(isClose(val, normalize(current.name))) win();
  else wrong();

  document.getElementById("guessInput").value="";
}

/* ================= LOGIC ================= */
function win(){
  streak++;
  if(streak>best) best=streak;
  save(); updateStats(); startGame();
}

function wrong(){
  level++;
  if(level>=LEVELS.length) return lose();
  draw(); updateHints();
}

function lose(){
  document.getElementById("resText").textContent="C'était "+current.name;
  streak=0;
  save(); updateStats();
  document.getElementById("gameBox").style.display="none";
  document.getElementById("resultBox").style.display="block";
}

/* ================= HINTS ================= */
function updateHints(){
  if(level===1) hint("Lettre : "+current.name[0]);
  if(level===3) hint(current.hints[0]);
  if(level===4) hint(current.hints.join(" | "));
}

function hint(t){ document.getElementById("hintBox").textContent=t; }

function generateHints(name){
  const p=name.split(" ");
  return ["Prénom : "+p[0], "Nom : "+(p[1]||"?")];
}

/* ================= AUTOCOMPLETE ================= */
function initAutocomplete(){
  const input = document.getElementById("guessInput");
  const box = document.getElementById("autocompleteBox");

  input.addEventListener("input", ()=>{
    const val=input.value.toLowerCase();
    box.innerHTML="";
    if(!val) return box.style.display="none";

    const matches = allNames.filter(n=>n.toLowerCase().includes(val)).slice(0,6);

    matches.forEach(name=>{
      const div=document.createElement("div");
      div.className="ac-item";
      div.innerHTML=name.replace(new RegExp(val,"gi"),m=>`<span class="ac-highlight">${m}</span>`);
      div.onclick=()=>{ input.value=name; box.style.display="none"; };
      box.appendChild(div);
    });

    box.style.display = matches.length ? "block":"none";
  });
}

/* ================= UTILS ================= */
function normalize(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"");
}

function isClose(a,b){ return a===b||b.includes(a)||a.includes(b); }

function updateStats(){
  document.getElementById("sStreak").textContent=streak;
  document.getElementById("sBest").textContent=best;
}

function save(){
  localStorage.setItem("pixel_bleach",JSON.stringify({best}));
}

function restart(){
  used.clear();
  streak=0;
  updateStats();
  document.getElementById("resultBox").style.display="none";
  startGame();
}
</script>

</body>
</html>
