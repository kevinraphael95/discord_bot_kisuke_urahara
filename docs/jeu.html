<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Guess — Bleach</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<script src="js/nav.js" defer></script>
<script src="js/data.js"></script>

<style>
.pg-wrap { max-width:900px;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem; }
.canvas-card { border:1px solid var(--gold-line); background:#000; padding:.25rem .5rem; }
canvas { width:100%; max-height:280px; display:block; transition:opacity .15s; }
.input-row { display:flex; gap:.5rem; position:relative; }
#guessInput { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:.6rem; }
.autocomplete { position:absolute; top:100%; left:0; right:60px; background:var(--panel); border:1px solid var(--gold-line); max-height:220px; overflow-y:auto; z-index:10; display:none; }
.ac-item { padding:.55rem .7rem; cursor:pointer; font-size:.85rem; border-bottom:1px solid rgba(255,255,255,.05); }
.ac-item:hover, .ac-item.active { background:rgba(201,168,76,.12); color:var(--gold); }
.ac-highlight { color:var(--gold); font-weight:bold; }
.hint { font-size:.8rem; color:var(--muted); text-align:center; min-height:18px; }
.btn-row { display:grid; grid-template-columns:1fr auto auto; gap:.5rem; }
.sstat { background:var(--panel); border:1px solid var(--gold-line); padding:.45rem; text-align:center; }
.sv { color:var(--gold); font-weight:bold; }
.sl { font-size:.6rem; color:var(--muted); }
#loadBox { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.8rem; min-height:240px; text-align:center; }
#resultBox { display:none; flex-direction:column; align-items:center; gap:1rem; }
#resultImg { width:100%; max-width:280px; border:1px solid var(--gold-line); display:block; }
.res-name { font-size:1.3rem; color:var(--gold); font-family:'Shippori Mincho',serif; font-weight:700; }
</style>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl"><span class="t1">Qui est ce personnage ? (Pixel Guess)</span></h1>
</div>

<div class="pg-wrap">

<div id="loadBox">
  <div class="spinner"></div>
  <div id="loadMsg">Chargement…</div>
</div>

<div id="gameBox" style="display:none; flex-direction:column; gap:1rem;">
  <div class="canvas-card">
    <canvas id="canvas" width="400" height="400"></canvas>
  </div>
  <div class="input-row">
    <input id="guessInput" autocomplete="off" placeholder="Nom du personnage..." />
    <button class="btn btn-gold" onclick="submit()">Valider</button>
    <div id="autocompleteBox" class="autocomplete"></div>
  </div>
  <div class="hint" id="hintBox"></div>
  <div class="btn-row">
    <div class="sstat"><span class="sv" id="sStreak">0</span><span class="sl">🔥 Série</span></div>
    <div class="sstat"><span class="sv" id="sBest">0</span><span class="sl">Record</span></div>
    <div class="sstat"><span class="sv" id="sLevel">0</span><span class="sl">Niveau</span></div>
  </div>
</div>

<div id="resultBox">
  <div class="res-title" id="resTitle"></div>
  <img id="resultImg" src="" alt="" />
  <div class="res-name" id="resName"></div>
  <button class="btn btn-gold" onclick="restart()">▶ Rejouer</button>
</div>

</div>

<script>
const $ = id => document.getElementById(id);
const LEVELS = [4, 6, 8, 10, 13, 16, 20, 25, 32, 45, 64, 120];

/*
  CROPS : zones de recadrage aléatoires [x, y, w, h] en proportions 0..1
  Chaque partie tire une zone différente → même image = vue totalement différente.
  Combiné à plusieurs sources d'images, la variation est maximale.
*/
const CROPS = [
  [0,    0,    1,    0.7 ],
  [0,    0.05, 1,    0.7 ],
  [0,    0.1,  1,    0.7 ],
  [0,    0.15, 1,    0.7 ],
  [0,    0.2,  1,    0.7 ],
  [0,    0.25, 1,    0.7 ],
  [0,    0,    1,    0.55],
  [0,    0.1,  1,    0.55],
  [0.05, 0,    0.9,  0.8 ],
  [0.1,  0,    0.8,  0.8 ],
  [0,    0,    0.85, 0.85],
  [0.15, 0,    0.85, 0.85],
  [0.05, 0.05, 0.9,  0.65],
  [0,    0,    0.75, 1   ],
  [0.25, 0,    0.75, 1   ],
];

let characters = [];  // { name, images:[url,...] }
let allNames   = [];
let used       = new Set();
let current, img, currentCrop;
let level = 0, streak = 0, best = 0, loading = false, acIndex = -1;

const canvas = $("canvas");
const ctx    = canvas.getContext("2d");

/* ===== INIT ===== */
window.onload = async () => {
  const s = JSON.parse(localStorage.getItem("pixel_bleach") || "null");
  if (s) best = s.best || 0;
  await loadCharacters();
  initAutocomplete();
  updateStats();
  startGame();
  $("guessInput").addEventListener("keypress", e => { if (e.key === "Enter") submit(); });
};

/* ===== LOAD =====
  Sources d'images :
  1. Jikan — Bleach (anime 269, original)
  2. Jikan — Bleach TYBW (anime 41467)
  3. AniList GraphQL — Bleach (id 205) + TYBW (id 146065)

  Pour chaque perso on accumule toutes les URLs trouvées dans un Set.
  À chaque partie : URL aléatoire + crop aléatoire = toujours différent.
*/
async function loadCharacters() {
  $("loadMsg").textContent = "Chargement des personnages…";
  const dataNames = new Set(CHARS.map(c => normalize(c.n)));
  const imageMap  = {}; // key → Set<url>

  $("loadMsg").textContent = "Source 1/3 — Jikan Bleach…";
  await fetchJikanAnime(269, dataNames, imageMap);

  $("loadMsg").textContent = "Source 2/3 — Jikan TYBW…";
  await fetchJikanAnime(41467, dataNames, imageMap);

  $("loadMsg").textContent = "Source 3/3 — AniList…";
  await fetchAniList([205, 146065], dataNames, imageMap);

  characters = CHARS
    .filter(c => imageMap[normalize(c.n)]?.size > 0)
    .map(c => ({ name: c.n, images: [...imageMap[normalize(c.n)]] }));

  allNames = CHARS.map(c => c.n);

  if (!characters.length)
    $("loadMsg").textContent = "Aucune image trouvée. Recharge la page.";
}

async function fetchJikanAnime(animeId, dataNames, imageMap) {
  try {
    const res  = await fetch(`https://api.jikan.moe/v4/anime/${animeId}/characters`);
    const json = await res.json();
    (json.data || []).forEach(e => {
      if (!e.character?.images?.jpg?.image_url) return;
      const raw   = e.character.name;
      const parts = raw.split(", ");
      const name  = parts.length === 2
        ? parts[1].trim() + " " + parts[0].trim()
        : raw.trim();
      const key = normalize(name);
      if (!dataNames.has(key)) return;
      if (!imageMap[key]) imageMap[key] = new Set();
      imageMap[key].add(e.character.images.jpg.image_url);
      if (e.character.images.webp?.image_url)
        imageMap[key].add(e.character.images.webp.image_url);
    });
  } catch(e) {
    console.warn("Jikan", animeId, "failed:", e);
  }
}

async function fetchAniList(mediaIds, dataNames, imageMap) {
  for (const mediaId of mediaIds) {
    let page = 1, hasNext = true;
    while (hasNext && page <= 8) {
      try {
        const query = `
          query($p:Int){
            Media(id:${mediaId},type:ANIME){
              characters(page:$p,perPage:25,sort:ROLE){
                pageInfo{hasNextPage}
                nodes{name{full}image{large medium}}
              }
            }
          }`;
        const res  = await fetch("https://graphql.anilist.co", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ query, variables: { p: page } })
        });
        const json  = await res.json();
        const chars = json?.data?.Media?.characters;
        if (!chars) break;
        hasNext = chars.pageInfo.hasNextPage;
        chars.nodes.forEach(node => {
          const key = normalize(node.name.full);
          if (!dataNames.has(key)) return;
          if (!imageMap[key]) imageMap[key] = new Set();
          if (node.image.large)  imageMap[key].add(node.image.large);
          if (node.image.medium) imageMap[key].add(node.image.medium);
        });
        page++;
        await sleep(250);
      } catch(e) {
        console.warn("AniList media", mediaId, "page", page, "failed:", e);
        break;
      }
    }
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ===== AUTOCOMPLETE ===== */
function initAutocomplete() {
  const input = $("guessInput");
  const box   = $("autocompleteBox");

  input.addEventListener("input", () => {
    const val = input.value.toLowerCase();
    box.innerHTML = ""; acIndex = -1;
    if (!val) return box.style.display = "none";
    const matches = allNames.filter(n => n.toLowerCase().includes(val)).slice(0, 8);
    matches.forEach(name => {
      const div = document.createElement("div");
      div.className = "ac-item";
      div.innerHTML = name.replace(new RegExp(val, "gi"), m => `<span class="ac-highlight">${m}</span>`);
      div.onclick = () => { input.value = name; box.style.display = "none"; };
      box.appendChild(div);
    });
    box.style.display = matches.length ? "block" : "none";
  });

  input.addEventListener("keydown", e => {
    const items = box.querySelectorAll(".ac-item");
    if (e.key === "ArrowDown") acIndex++;
    if (e.key === "ArrowUp")   acIndex--;
    if (e.key === "Enter" && acIndex >= 0 && items[acIndex]) {
      input.value = items[acIndex].textContent;
      box.style.display = "none";
    }
    items.forEach(i => i.classList.remove("active"));
    if (items.length) {
      if (acIndex >= items.length) acIndex = 0;
      if (acIndex < 0) acIndex = items.length - 1;
      items[acIndex]?.classList.add("active");
    }
  });

  document.addEventListener("click", e => {
    if (!box.contains(e.target) && e.target !== input) box.style.display = "none";
  });
}

/* ===== GAME ===== */
function startGame() {
  loading = true;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.style.opacity = "0";
  showState("load");

  if (!characters.length) {
    $("loadMsg").textContent = "Aucun personnage disponible.";
    return;
  }

  const pool = characters.filter(c => !used.has(c.name));
  if (!pool.length) used.clear();
  current = pool[Math.floor(Math.random() * pool.length)];
  used.add(current.name);

  // Image aléatoire parmi toutes les sources disponibles pour ce perso
  const imgUrl = current.images[Math.floor(Math.random() * current.images.length)];
  // Crop aléatoire — garantit une vue différente même si l'URL est identique
  currentCrop  = CROPS[Math.floor(Math.random() * CROPS.length)];

  level = 0;
  tryLoad(imgUrl, current.images);
}

function tryLoad(url, allUrls) {
  preloadImage(url)
    .then(im => {
      img = im;
      draw();
      canvas.style.opacity = "1";
      $("hintBox").textContent = "";
      showState("game");
      $("guessInput").focus();
      loading = false;
    })
    .catch(() => {
      // Essayer une autre URL du même perso
      const others = allUrls.filter(u => u !== url);
      if (others.length) {
        const next = others[Math.floor(Math.random() * others.length)];
        tryLoad(next, others.filter(u => u !== next));
      } else {
        used.add(current.name);
        startGame();
      }
    });
}

function preloadImage(src) {
  return new Promise((resolve, reject) => {
    const im = new Image();
    im.crossOrigin = "Anonymous";
    im.onload  = () => resolve(im);
    im.onerror = reject;
    im.src = src;
  });
}

function draw() {
  const size = LEVELS[level];
  const [cx, cy, cw, ch] = currentCrop;

  const srcX = Math.floor(cx * img.naturalWidth);
  const srcY = Math.floor(cy * img.naturalHeight);
  const srcW = Math.floor(cw * img.naturalWidth);
  const srcH = Math.floor(ch * img.naturalHeight);

  // Off-screen canvas pour la réduction propre sans lissage
  const off = document.createElement("canvas");
  off.width = off.height = size;
  const octx = off.getContext("2d");
  octx.imageSmoothingEnabled = false;
  octx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, size, size);

  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(off, 0, 0, size, size, 0, 0, canvas.width, canvas.height);

  $("sLevel").textContent = size + "x" + size;
}

/* ===== INPUT ===== */
function submit() {
  if (loading) return;
  $("autocompleteBox").style.display = "none";
  const val = normalize($("guessInput").value);
  if (!val) return;
  if (isClose(val, normalize(current.name))) win();
  else wrong();
  $("guessInput").value = "";
}

function win() {
  streak++; if (streak > best) best = streak;
  save(); updateStats();
  showResult("✅ Bien joué !");
}

function wrong() {
  level++;
  if (level >= LEVELS.length) return lose();
  draw(); updateHints();
}

function lose() {
  streak = 0; save(); updateStats();
  showResult("💀 Perdu !");
}

function showResult(titre) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.style.opacity = "0";
  $("resTitle").textContent = titre;
  $("resName").textContent  = current.name;
  $("resultImg").src        = img.src;
  showState("result");
}

/* ===== HINTS ===== */
function updateHints() {
  const parts = current.name.split(" ");
  if (level === 2) $("hintBox").textContent = "Initiale : " + current.name[0];
  if (level === 5) $("hintBox").textContent = "Prénom : " + parts[0];
  if (level === 8) $("hintBox").textContent = "Prénom : " + parts[0] + " | Nom : " + (parts[1] || "?");
}

/* ===== UTILS ===== */
function normalize(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
}
function isClose(a, b) { return a === b || b.includes(a) || a.includes(b); }
function save()         { localStorage.setItem("pixel_bleach", JSON.stringify({ best })); }
function updateStats()  { $("sStreak").textContent = streak; $("sBest").textContent = best; }
function restart()      { used.clear(); streak = 0; updateStats(); startGame(); }
function showState(s) {
  $("loadBox").style.display   = s === "load"   ? "flex" : "none";
  $("gameBox").style.display   = s === "game"   ? "flex" : "none";
  $("resultBox").style.display = s === "result" ? "flex" : "none";
}
</script>

</body>
</html>
