<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Guess — Bleach</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<script src="js/nav.js" defer></script>

<style>
.pg-wrap { max-width:900px;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem; }
.canvas-card { border:1px solid var(--gold-line); background:#000; padding:.5rem; }
canvas { width:100%; max-height:420px; display:block; }
.input-row { display:flex; gap:.5rem; position:relative; }
#guessInput { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:.6rem; }
.autocomplete { position:absolute; top:100%; left:0; right:60px; background:var(--panel); border:1px solid var(--gold-line); max-height:220px; overflow-y:auto; z-index:10; display:none; }
.ac-item { padding:.55rem .7rem; cursor:pointer; font-size:.85rem; border-bottom:1px solid rgba(255,255,255,.05); }
.ac-item:hover, .ac-item.active { background:rgba(201,168,76,.12); color:var(--gold); }
.ac-highlight { color:var(--gold); font-weight:bold; }
.hint { font-size:.8rem; color:var(--muted); text-align:center; min-height:18px; }
.btn-row { display:grid; grid-template-columns:1fr auto auto; gap:.5rem; }
.sstat { background:var(--panel); border:1px solid var(--gold-line); padding:.45rem; text-align:center; }
.sv { color:var(--gold); font-weight:bold; }
.sl { font-size:.6rem; color:var(--muted); }
#loadBox { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.8rem; min-height:300px; text-align:center; }
#resultBox { display:none; flex-direction:column; align-items:center; gap:1rem; }
#resultImg { width:100%; max-width:400px; border:1px solid var(--gold-line); display:block; }
.res-name { font-size:1.3rem; color:var(--gold); font-family:'Shippori Mincho',serif; font-weight:700; }
</style>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl"><span class="t1">Qui est ce personnage ? (Pixel Guess)</span></h1>
</div>

<div class="pg-wrap">

<div id="loadBox">
  <div class="spinner"></div>
  <div id="loadMsg">Chargement…</div>
</div>

<div id="gameBox" style="display:none; flex-direction:column; gap:1rem;">
  <div class="canvas-card">
    <canvas id="canvas" width="400" height="400"></canvas>
  </div>
  <div class="input-row">
    <input id="guessInput" autocomplete="off" placeholder="Nom du personnage..." />
    <button class="btn btn-gold" onclick="submit()">Valider</button>
    <div id="autocompleteBox" class="autocomplete"></div>
  </div>
  <div class="hint" id="hintBox"></div>
  <div class="btn-row">
    <div class="sstat"><span class="sv" id="sStreak">0</span><span class="sl">🔥 Série</span></div>
    <div class="sstat"><span class="sv" id="sBest">0</span><span class="sl">Record</span></div>
    <div class="sstat"><span class="sv" id="sLevel">0</span><span class="sl">Niveau</span></div>
  </div>
</div>

<div id="resultBox">
  <div class="res-title" id="resTitle"></div>
  <img id="resultImg" src="" alt="" />
  <div class="res-name" id="resName"></div>
  <button class="btn btn-gold" onclick="restart()">▶ Rejouer</button>
</div>

</div>

<script>
const $ = id => document.getElementById(id);

const LEVELS = [4, 6, 8, 10, 13, 16, 20, 25, 32, 45, 64, 120];

/* ===== BASE DE DONNÉES ===== */
const CHARACTERS = [
  { name: "Ichigo Kurosaki",       image: "https://cdn.myanimelist.net/images/characters/9/310307.jpg" },
  { name: "Rukia Kuchiki",         image: "https://cdn.myanimelist.net/images/characters/9/131317.jpg" },
  { name: "Orihime Inoue",         image: "https://cdn.myanimelist.net/images/characters/3/91007.jpg" },
  { name: "Yasutora Sado",         image: "https://cdn.myanimelist.net/images/characters/3/91010.jpg" },
  { name: "Uryuu Ishida",          image: "https://cdn.myanimelist.net/images/characters/14/91004.jpg" },
  { name: "Renji Abarai",          image: "https://cdn.myanimelist.net/images/characters/10/171877.jpg" },
  { name: "Byakuya Kuchiki",       image: "https://cdn.myanimelist.net/images/characters/11/72879.jpg" },
  { name: "Toshiro Hitsugaya",     image: "https://cdn.myanimelist.net/images/characters/8/72875.jpg" },
  { name: "Rangiku Matsumoto",     image: "https://cdn.myanimelist.net/images/characters/2/72877.jpg" },
  { name: "Gin Ichimaru",          image: "https://cdn.myanimelist.net/images/characters/7/72873.jpg" },
  { name: "Sosuke Aizen",          image: "https://cdn.myanimelist.net/images/characters/13/72869.jpg" },
  { name: "Kaname Tousen",         image: "https://cdn.myanimelist.net/images/characters/4/72871.jpg" },
  { name: "Kisuke Urahara",        image: "https://cdn.myanimelist.net/images/characters/2/72863.jpg" },
  { name: "Yoruichi Shihouin",     image: "https://cdn.myanimelist.net/images/characters/6/72865.jpg" },
  { name: "Kenpachi Zaraki",       image: "https://cdn.myanimelist.net/images/characters/7/72897.jpg" },
  { name: "Mayuri Kurotsuchi",     image: "https://cdn.myanimelist.net/images/characters/11/72901.jpg" },
  { name: "Grimmjow Jaegerjaquez", image: "https://cdn.myanimelist.net/images/characters/6/167038.jpg" },
  { name: "Ulquiorra Cifer",       image: "https://cdn.myanimelist.net/images/characters/8/167040.jpg" },
  { name: "Tier Harribel",         image: "https://cdn.myanimelist.net/images/characters/8/167054.jpg" },
  { name: "Coyote Starrk",         image: "https://cdn.myanimelist.net/images/characters/6/167052.jpg" },
  { name: "Neliel Tu Odelschwanck",image: "https://cdn.myanimelist.net/images/characters/12/167058.jpg" },
  { name: "Yhwach",                image: "https://cdn.myanimelist.net/images/characters/8/243745.jpg" },
  { name: "Shinji Hirako",         image: "https://cdn.myanimelist.net/images/characters/6/193045.jpg" },
  { name: "Isshin Kurosaki",       image: "https://cdn.myanimelist.net/images/characters/5/116345.jpg" },
  { name: "Kon",                   image: "https://cdn.myanimelist.net/images/characters/7/116349.jpg" },
];

/* ===== STATE ===== */
let characters = CHARACTERS.map(c => ({ ...c, hints: generateHints(c.name) }));
let allNames = characters.map(c => c.name);
let used = new Set();
let current, img;
let level = 0, streak = 0, best = 0, loading = false, acIndex = -1;

const canvas = $("canvas");
const ctx = canvas.getContext("2d");

/* ===== INIT ===== */
window.onload = () => {
  const s = JSON.parse(localStorage.getItem("pixel_bleach") || "null");
  if (s) best = s.best || 0;
  initAutocomplete();
  updateStats();
  startGame();
  $("guessInput").addEventListener("keypress", e => { if (e.key === "Enter") submit(); });
};

/* ===== AUTOCOMPLETE ===== */
function initAutocomplete() {
  const input = $("guessInput");
  const box = $("autocompleteBox");

  input.addEventListener("input", () => {
    const val = input.value.toLowerCase();
    box.innerHTML = ""; acIndex = -1;
    if (!val) return box.style.display = "none";
    const matches = allNames.filter(n => n.toLowerCase().includes(val)).slice(0, 8);
    matches.forEach(name => {
      const div = document.createElement("div");
      div.className = "ac-item";
      div.innerHTML = name.replace(new RegExp(val, "gi"), m => `<span class="ac-highlight">${m}</span>`);
      div.onclick = () => { input.value = name; box.style.display = "none"; };
      box.appendChild(div);
    });
    box.style.display = matches.length ? "block" : "none";
  });

  input.addEventListener("keydown", e => {
    const items = box.querySelectorAll(".ac-item");
    if (e.key === "ArrowDown") acIndex++;
    if (e.key === "ArrowUp") acIndex--;
    if (e.key === "Enter" && acIndex >= 0 && items[acIndex]) {
      input.value = items[acIndex].textContent;
      box.style.display = "none";
    }
    items.forEach(i => i.classList.remove("active"));
    if (items.length) {
      if (acIndex >= items.length) acIndex = 0;
      if (acIndex < 0) acIndex = items.length - 1;
      items[acIndex]?.classList.add("active");
    }
  });

  document.addEventListener("click", e => {
    if (!box.contains(e.target) && e.target !== input) box.style.display = "none";
  });
}

/* ===== GAME ===== */
function startGame() {
  loading = true; showState("load");
  const pool = characters.filter(c => !used.has(c.name));
  if (!pool.length) used.clear();
  current = pool[Math.floor(Math.random() * pool.length)];
  used.add(current.name);
  level = 0;
  preloadImage(current.image).then(im => {
    img = im; draw();
    $("hintBox").textContent = "";
    showState("game");
    $("guessInput").focus();
    loading = false;
  }).catch(() => { used.add(current.name); startGame(); });
}

function preloadImage(src) {
  return new Promise((resolve, reject) => {
    const im = new Image();
    im.crossOrigin = "Anonymous";
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = src;
  });
}

function draw() {
  const size = LEVELS[level];
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, size, size);
  ctx.drawImage(canvas, 0, 0, size, size, 0, 0, canvas.width, canvas.height);
  $("sLevel").textContent = size + "x" + size;
}

function submit() {
  if (loading) return;
  $("autocompleteBox").style.display = "none";
  const val = normalize($("guessInput").value);
  if (!val) return;
  if (isClose(val, normalize(current.name))) win();
  else wrong();
  $("guessInput").value = "";
}

function win() {
  streak++;
  if (streak > best) best = streak;
  save(); updateStats();
  showResult("✅ Bien joué !");
}

function wrong() {
  level++;
  if (level >= LEVELS.length) return lose();
  draw(); updateHints();
}

function lose() {
  streak = 0; save(); updateStats();
  showResult("💀 Perdu !");
}

function showResult(titre) {
  $("resTitle").textContent = titre;
  $("resName").textContent = current.name;
  // Image pleine résolution sans crossOrigin pour éviter les blocages CORS sur l'affichage
  const ri = $("resultImg");
  ri.onload = null;
  ri.src = "";
  ri.src = current.image;
  showState("result");
}

function updateHints() {
  if (level === 2) $("hintBox").textContent = "Initiale : " + current.name[0];
  if (level === 5) $("hintBox").textContent = current.hints[0];
  if (level === 8) $("hintBox").textContent = current.hints.join(" | ");
}

function generateHints(name) {
  const p = name.split(" ");
  return ["Prénom : " + p[0], "Nom : " + (p[1] || "?")];
}

function normalize(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
}
function isClose(a, b) { return a === b || b.includes(a) || a.includes(b); }
function save() { localStorage.setItem("pixel_bleach", JSON.stringify({ best })); }
function updateStats() { $("sStreak").textContent = streak; $("sBest").textContent = best; }
function restart() { used.clear(); streak = 0; updateStats(); startGame(); }
function showState(s) {
  $("loadBox").style.display   = s === "load"   ? "flex" : "none";
  $("gameBox").style.display   = s === "game"   ? "flex" : "none";
  $("resultBox").style.display = s === "result" ? "flex" : "none";
}
</script>

</body>
</html>
