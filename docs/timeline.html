<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avant ou Après ? — Bleach Manga Guesser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<script src="js/nav.js" defer></script>
<style>
.tl-wrap {
  position: relative; z-index: 1;
  max-width: 1000px; margin: 0 auto;
  padding: 1.5rem 1.5rem 4rem;
  display: flex; flex-direction: column; gap: 1.2rem;
}

.sstat {
  background: var(--panel); border: 1px solid var(--gold-line);
  padding: .45rem .9rem; text-align: center;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 56px;
}
.sstat .sv { font-family: 'Shippori Mincho', serif; font-size: .95rem; font-weight: 700; color: var(--gold); display: block; }
.sstat .sl { font-size: .52rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

#loadBox {
  background: var(--panel); border: 1px solid var(--gold-line);
  padding: 3rem 1.5rem; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
}
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
#loadMsg { color: var(--muted); font-size: .82rem; }
.prog-wrap { width: 160px; height: 1px; background: var(--border); }
.prog-fill { height: 100%; background: var(--gold); transition: width .4s; width: 0%; }

#gameBox {
  display: none; flex-direction: column; gap: 1.2rem;
}

.images-row {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center;
}

.img-card {
  border: 1px solid var(--gold-line);
  background: var(--deep, #0a0a0f);
  overflow: hidden; position: relative;
}
.img-card img {
  width: 100%; max-height: 420px; object-fit: contain;
  display: block; background: #000;
}
.img-label {
  position: absolute; top: 0; left: 0; right: 0;
  padding: .35rem .7rem;
  background: rgba(0,0,0,.75);
  font-size: .62rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase;
  font-family: 'DM Sans', sans-serif;
}

.vs-divider {
  display: flex; flex-direction: column; align-items: center; gap: .4rem;
  color: var(--muted);
}
.vs-line { width: 1px; height: 36px; background: var(--border); }
.vs-text {
  font-family: 'Shippori Mincho', serif;
  font-size: .85rem; color: var(--muted);
}

.btn-row {
  display: grid; grid-template-columns: 1fr 1fr auto auto; gap: .5rem;
  align-items: stretch;
  max-width: 600px; margin: 0 auto; width: 100%;
}

.btn-choice {
  padding: .45rem 1rem;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem; font-weight: 500;
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
  display: flex; flex-direction: row; align-items: center; justify-content: center; gap: .5rem;
}
.btn-choice .bc-icon { font-size: .95rem; }
.btn-choice .bc-label { display: none; }

.btn-choice.before:hover { border-color: #4a7fc9; background: rgba(74,127,201,.1); color: #7aaef0; }
.btn-choice.after:hover  { border-color: #9b59b6; background: rgba(155,89,182,.1); color: #c9a0f0; }
.btn-choice:active { transform: scale(0.97); }

.streak-bar {
  text-align: center; font-size: .75rem; color: var(--muted);
}
.streak-dots { display: flex; gap: 5px; justify-content: center; margin-top: .4rem; flex-wrap: wrap; }
.sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok-bd, #4caf82); opacity: .25; transition: opacity .3s; }
.sdot.active { opacity: 1; box-shadow: 0 0 5px var(--ok-bd, #4caf82); }

#resultBox {
  background: var(--panel); border: 1px solid var(--ko-bd, #c95c4c);
  padding: 2.5rem 1.5rem;
  display: none; flex-direction: column; align-items: center; gap: 1rem; text-align: center;
}
.res-emoji { font-size: 2.2rem; }
.res-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.6rem; font-weight: 800; color: var(--ko-bd, #c95c4c);
}
.res-info { font-size: .88rem; color: var(--muted); }
.res-info strong { color: var(--text); font-weight: 500; }
.res-record { font-family: 'Shippori Mincho', serif; font-size: .95rem; color: var(--gold); }

#errorBox {
  background: var(--panel); border: 1px solid var(--ko-bd, #c95c4c);
  padding: 2rem 1.5rem; text-align: center;
  display: none; flex-direction: column; align-items: center; gap: 1rem;
}
#errMsg { color: var(--muted); font-size: .88rem; }

.btn { padding: .65rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 500; cursor: pointer; transition: all .15s; border: 1px solid var(--border); background: var(--panel); color: var(--text); letter-spacing: .03em; }
.btn-gold { border-color: var(--gold); color: var(--gold); background: transparent; }
.btn-gold:hover { background: rgba(201,168,76,.1); }
.btn-ghost { color: var(--muted); }
.btn-ghost:hover { color: var(--text); border-color: var(--border); }

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .images-row { grid-template-columns: 1fr; }
  .vs-divider { flex-direction: row; }
  .vs-line { width: 36px; height: 1px; }
  .tl-wrap { padding: 1rem 1rem 3rem; }
  .btn-row { grid-template-columns: 1fr 1fr; }
  .btn-row .sstat { display: none; }
}
</style>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">La deuxième image est-elle <strong>avant</strong> ou <strong>après</strong> ?</span>
  </h1>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>

<div class="tl-wrap">

  <div id="loadBox">
    <div class="spinner"></div>
    <div id="loadMsg">Chargement des pages…</div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <div id="gameBox">
    <div class="images-row">
      <div class="img-card">
        <div class="img-label">Image 1 — référence</div>
        <img id="imgA" alt="Page de référence" />
      </div>
      <div class="vs-divider">
        <div class="vs-line"></div>
        <div class="vs-text">VS</div>
        <div class="vs-line"></div>
      </div>
      <div class="img-card">
        <div class="img-label">Image 2 — à situer</div>
        <img id="imgB" alt="Page à situer" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-choice before" onclick="answer('before')">
        <span class="bc-icon">◀◀</span>
        <span>Avant</span>
      </button>
      <button class="btn-choice after" onclick="answer('after')">
        <span class="bc-icon">▶▶</span>
        <span>Après</span>
      </button>
      <div class="sstat"><span class="sv" id="sStreak">0</span><span class="sl">Série 🔥</span></div>
      <div class="sstat"><span class="sv" id="sBest">0</span><span class="sl">Record</span></div>
    </div>

    <div class="streak-bar">
      Série en cours
      <div class="streak-dots" id="streakDots"></div>
    </div>
  </div>

  <div id="resultBox">
    <div class="res-emoji">💀</div>
    <div class="res-title">Raté !</div>
    <div class="res-info">Tu as tenu <strong id="resStreak">0</strong> bonne(s) réponse(s)</div>
    <div class="res-record" id="resBest"></div>
    <button class="btn btn-gold" onclick="restart()">▶ Rejouer</button>
  </div>

  <div id="errorBox">
    <div id="errMsg">Impossible de charger les images.</div>
    <button class="btn btn-ghost" onclick="restart()">🔄 Réessayer</button>
  </div>

</div>

<script>
const MAX_VOLUME = 74;
const $ = id => document.getElementById(id);

let imgA = null, imgB = null;
let usedImages = new Set();
let streak = 0, best = 0, loading = false;

window.addEventListener('load', () => {
  const s = JSON.parse(localStorage.getItem('bqc_tl_v1') || 'null');
  if (s) { best = s.best || 0; }
  updStats();
  startGame();
});

async function fetchHtml(url) {
  const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

function setLoad(msg, pct) {
  $('loadMsg').textContent = msg;
  $('progFill').style.width = pct + '%';
}

async function fetchRandomPage(attempt = 0) {
  if (attempt > 15) throw new Error("Trop de tentatives");
  const num = Math.floor(Math.random() * MAX_VOLUME) + 1;
  const url = `https://sushiscan.fr/bleach-volume-${num}/`;
  let html;
  try { html = await fetchHtml(url); } catch { return fetchRandomPage(attempt + 1); }
  const match = html.match(/ts_reader\.run\((.+?)\)\s*;/s);
  if (!match) return fetchRandomPage(attempt + 1);
  let data;
  try { data = JSON.parse(match[1]); } catch { return fetchRandomPage(attempt + 1); }
  const images = data?.sources?.[0]?.images;
  if (!images?.length) return fetchRandomPage(attempt + 1);
  const pageIndex = Math.floor(Math.random() * (images.length - 1)) + 1;
  const imgUrl = images[pageIndex];
  if (usedImages.has(imgUrl)) return fetchRandomPage(attempt + 1);
  return { num, imgUrl, pageIndex };
}

async function fetchRandomPageInVolume(num, excludeIndex = -1, attempt = 0) {
  if (attempt > 15) throw new Error("Trop de tentatives");
  const url = `https://sushiscan.fr/bleach-volume-${num}/`;
  let html;
  try { html = await fetchHtml(url); } catch { return fetchRandomPageInVolume(num, excludeIndex, attempt + 1); }
  const match = html.match(/ts_reader\.run\((.+?)\)\s*;/s);
  if (!match) throw new Error("Parse fail");
  let data;
  try { data = JSON.parse(match[1]); } catch { throw new Error("JSON fail"); }
  const images = data?.sources?.[0]?.images;
  if (!images?.length) throw new Error("No images");
  let pageIndex;
  let tries = 0;
  do {
    pageIndex = Math.floor(Math.random() * (images.length - 1)) + 1;
    tries++;
    if (tries > 50) throw new Error("Pas assez de pages distinctes");
  } while (usedImages.has(images[pageIndex]) || pageIndex === excludeIndex);
  const imgUrl = images[pageIndex];
  usedImages.add(imgUrl);
  return { num, imgUrl, pageIndex };
}

async function loadImgEl(elId, data) {
  return new Promise((resolve, reject) => {
    const el = $(elId);
    const timeout = setTimeout(reject, 12000);
    el.onload  = () => { clearTimeout(timeout); resolve(); };
    el.onerror = () => { clearTimeout(timeout); reject(); };
    el.src = data.imgUrl;
  });
}

async function startGame() {
  if (loading) return;
  loading = true;
  showState('loading');
  setLoad('🎲 Tirage des pages…', 20);

  try {
    let a = await fetchRandomPage();
    usedImages.add(a.imgUrl);
    setLoad('🎲 Tirage de la deuxième page…', 50);
    let b = await fetchRandomPageInVolume(a.num, a.pageIndex);

    imgA = a; imgB = b;
    setLoad('🖼 Chargement images…', 80);
    await Promise.all([loadImgEl('imgA', imgA), loadImgEl('imgB', imgB)]);
    showState('game');
  } catch(e) {
    console.error(e);
    showState('error');
  }
  loading = false;
}

function answer(choice) {
  if (loading) return;
  const correct = (choice === 'before' && imgB.pageIndex < imgA.pageIndex) ||
                  (choice === 'after'  && imgB.pageIndex > imgA.pageIndex);

  if (correct) {
    streak++;
    if (streak > best) {
      best = streak;
      localStorage.setItem('bqc_tl_v1', JSON.stringify({ best }));
    }
    updStats();
    nextRound();
  } else {
    showResult();
  }
}

async function nextRound() {
  if (loading) return;
  loading = true;
  showState('loading');
  setLoad('🖼 Nouvelle page…', 30);

  try {
    imgA = imgB;
    $('imgA').src = imgA.imgUrl;

    let b = await fetchRandomPageInVolume(imgA.num, imgA.pageIndex);
    imgB = b;

    setLoad('🖼 Chargement…', 70);
    await loadImgEl('imgB', imgB);
    showState('game');
  } catch(e) {
    console.error(e);
    showState('error');
  }
  loading = false;
}

function showResult() {
  $('resStreak').textContent = streak;
  $('resBest').textContent = best > 0 ? `Record : ${best}` : '';
  streak = 0;
  updStats();
  localStorage.setItem('bqc_tl_v1', JSON.stringify({ best }));
  showState('result');
}

function restart() {
  usedImages = new Set();
  imgA = null; imgB = null;
  streak = 0;
  updStats();
  startGame();
}

function showState(state) {
  ['loadBox','gameBox','resultBox','errorBox'].forEach(id => {
    const el = $(id);
    if (el) el.style.display = 'none';
  });
  const map = { loading: 'loadBox', game: 'gameBox', result: 'resultBox', error: 'errorBox' };
  const target = $(map[state]);
  if (target) target.style.display = 'flex';
}

function updStats() {
  $('sStreak').textContent = streak;
  $('sBest').textContent   = best;
  const dots = $('streakDots');
  if (!dots) return;
  dots.innerHTML = '';
  const show = Math.max(streak, 5);
  for (let i = 0; i < show; i++) {
    const d = document.createElement('div');
    d.className = 'sdot' + (i < streak ? ' active' : '');
    dots.appendChild(d);
  }
}
</script>
</body>
</html>
