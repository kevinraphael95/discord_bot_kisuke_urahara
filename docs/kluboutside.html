<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klub Outside — Questions</title>

<script>
const t = localStorage.getItem('shinigami-theme');
document.documentElement.setAttribute(
  'data-theme',
  ['shinigami','quincy'].includes(t) ? t : 'shinigami'
);
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/minijeux.css">
<link rel="stylesheet" href="css/kluboutside.css">

<script src="js/nav.js" defer></script>
<script src="js/kluboutside.js" defer></script>

</head>

<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">Klub Outside</span>
  </h1>

  <p class="psub">
    Les questions et réponses de la FAQ du Klub Outside.
  </p>

  <div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
</div>

<div class="content">

  <div class="ko-wrap">

    <div class="ko-sidebar">

      <input
        class="ko-search"
        type="text"
        placeholder="Rechercher…"
        id="koSearch"
      >

      <button class="ko-btn-random" id="koRandom">
        🔀 Aléatoire
      </button>

      <div class="ko-list" id="koList"></div>

    </div>

    <div class="ko-card" id="koCard">
      <div class="ko-empty">
        Chargement…
      </div>
    </div>

  </div>

</div>

</body>
</html>
