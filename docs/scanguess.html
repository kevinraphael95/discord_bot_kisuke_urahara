<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quel Tome ? — Bleach Manga Guesser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<script src="js/nav.js" defer></script>
<style>
.gwrap {
  position: relative; z-index: 1;
  max-width: 1000px; margin: 0 auto;
  padding: 1.5rem 1.5rem 4rem;
}

.game-layout {
  display: flex; gap: 1.5rem; align-items: flex-start;
}
.col-img  { flex: 1 1 55%; min-width: 0; }
.col-game { flex: 1 1 45%; min-width: 0; display: flex; flex-direction: column; gap: .7rem; }

.sstat {
  background: var(--panel); border: 1px solid var(--gold-line);
  padding: .6rem .8rem; text-align: center;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.sstat .sv { font-family: 'Shippori Mincho', serif; font-size: 1.3rem; font-weight: 700; color: var(--gold); display: block; }
.sstat .sl { font-size: .58rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

.sstat.consigne {
  flex-direction: row; justify-content: space-between; align-items: center;
  padding: .7rem 1rem; gap: 1rem;
}
.sstat.consigne .sl { font-size: .78rem; letter-spacing: .02em; text-transform: none; color: var(--text); }
.sstat.consigne .sv { font-size: .78rem; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--muted); white-space: nowrap; }

.scorebar {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: .4rem;
}

#loadBox {
  background: var(--panel); border: 1px solid var(--gold-line);
  padding: 2rem 1.5rem; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
}
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
#loadMsg { color: var(--muted); font-size: .82rem; }
.prog-wrap { width: 160px; height: 1px; background: var(--border); }
.prog-fill { height: 100%; background: var(--gold); transition: width .4s; width: 0%; }

#imgBox { border: 1px solid var(--gold-line); overflow: hidden; display: none; position: relative; background: var(--deep); }
#mangaImg { width: 100%; max-height: 520px; object-fit: contain; display: block; background: #000; }
.img-src { position: absolute; bottom: 0; right: 0; padding: 3px 8px; background: rgba(0,0,0,.6); font-size: .6rem; color: var(--dim); letter-spacing: .05em; }

.tries-row { display: flex; gap: 5px; justify-content: center; }
.try-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .3s; }
.try-dot.correct { background: var(--ok-bd); box-shadow: 0 0 5px var(--ok-bd); }
.try-dot.close   { background: var(--yw-bd); box-shadow: 0 0 5px var(--yw-bd); }
.try-dot.wrong   { background: var(--ko-bd); box-shadow: 0 0 5px var(--ko-bd); }

#inputBox { display: none; flex-direction: column; }
.input-row { display: flex; gap: .4rem; }
#chapInput { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .9rem; padding: .65rem .9rem; outline: none; transition: border-color .2s; }
#chapInput:focus { border-color: var(--gold-line); }
#chapInput::placeholder { color: var(--dim); }

#histBox { display: flex; flex-direction: column; gap: .3rem; }
.hist-item { background: var(--surface); border: 1px solid var(--border); padding: .45rem .8rem; display: flex; justify-content: space-between; align-items: center; font-size: .82rem; }
.hist-item.correct { border-color: var(--ok-bd); }
.hist-item.close   { border-color: var(--yw-bd); }
.hist-item.wrong   { border-color: var(--ko-bd); }

#result { background: var(--panel); border: 1px solid var(--gold-line); padding: 1.2rem; display: none; flex-direction: column; align-items: center; gap: .6rem; text-align: center; }
#result.win  { border-color: var(--ok-bd); }
#result.lose { border-color: var(--ko-bd); }
.res-title { font-family: 'Shippori Mincho', serif; font-size: 1.1rem; font-weight: 800; color: var(--gold); }
.res-chap  { font-family: 'Shippori Mincho', serif; font-size: 1.6rem; font-weight: 800; color: var(--white); }

#errorBox { background: var(--ko-bg); border: 1px solid var(--ko-bd); padding: 1.5rem; text-align: center; display: none; flex-direction: column; gap: .8rem; }
#errMsg { color: var(--ko-tx); font-size: .88rem; }

.btn { padding: .65rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 500; cursor: pointer; transition: all .15s; border: 1px solid var(--border); background: var(--panel); color: var(--text); letter-spacing: .03em; }
.btn-gold { border-color: var(--gold); color: var(--gold); background: transparent; }
.btn-gold:hover { background: rgba(201,168,76,.1); }
.btn-ghost { color: var(--muted); }
.btn-ghost:hover { color: var(--text); border-color: var(--border); }

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .game-layout { flex-direction: column; }
  .gwrap { padding: 1rem 1rem 3rem; }
}
</style>
</head>
<body>
<div class="atmo"></div>
<div class="top-bar"></div>
<div class="phdr">
  <h1 class="pttl">
    <span class="t1">De quel tome vient cette page ?</span>
  </h1>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>
<div class="gwrap">
  <div class="game-layout">
    <div class="col-img">
      <div id="loadBox">
        <div class="spinner"></div>
        <div id="loadMsg">Chargement…</div>
        <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
      </div>
      <div id="errorBox" style="display:none;">
        <div id="errMsg">Impossible de charger. Vérifie ta connexion.</div>
        <button class="btn btn-ghost" onclick="newRound()">🔄 Réessayer</button>
      </div>
      <div id="imgBox" style="display:none;">
        <img id="mangaImg" alt="Page de Bleach"/>
        <div class="img-src">📖 SushiScan · Bleach</div>
      </div>
    </div>
    <div class="col-game">
      <div class="sstat consigne">
        <span class="sl">Devine de quel tome vient cette page</span>
        <span class="sv">5 essais</span>
      </div>
      <div class="scorebar">
        <div class="sstat"><span class="sv" id="sScore">0</span><span class="sl">Score</span></div>
        <div class="sstat"><span class="sv" id="sStreak">0</span><span class="sl">Série 🔥</span></div>
        <div class="sstat"><span class="sv" id="sBest">0</span><span class="sl">Record</span></div>
        <div class="sstat"><span class="sv" id="sRound">0</span><span class="sl">Manche</span></div>
      </div>
      <div class="tries-row" id="triesRow"></div>
      <div id="inputBox" style="display:none;">
        <div class="input-row">
          <input type="number" id="chapInput" placeholder="Tome (1 – 74)" min="1" max="74" onkeydown="if(event.key==='Enter') submit()"/>
          <button class="btn btn-gold" onclick="submit()">Valider</button>
        </div>
      </div>
      <div id="histBox"></div>
      <div id="result" style="display:none;">
        <div class="res-title" id="resTtl"></div>
        <div class="res-chap" id="resChap"></div>
        <button class="btn btn-gold" onclick="newRound()">▶ Prochaine page</button>
      </div>
    </div>
  </div>
</div>

<script>
const MAX_TRIES = 5;
const CLOSE_MARGIN = 3;
const MAX_VOLUME = 74;

let target = null, tries = [], over = false, score = 0, streak = 0, best = 0, round = 0;
const $ = id => document.getElementById(id);

window.addEventListener('load', () => {
    const s = JSON.parse(localStorage.getItem('bqc_v1') || 'null');
    if (s) { score = s.score || 0; best = s.best || 0; }
    newRound();
});

async function newRound() {
    tries = []; over = false; target = null;

    ['imgBox','inputBox','result','errorBox'].forEach(id => {
        const el = $(id); if (el) el.style.display = 'none';
    });

    $('loadBox').style.display = 'flex';
    $('histBox').innerHTML = '';

    updTries();
    updStats();

    try {
        await loadVolume();
    } catch(e) {
        console.error(e);
        $('loadBox').style.display = 'none';
        $('errorBox').style.display = 'flex';
        $('errMsg').textContent = "Connexion impossible.";
    }
}

async function fetchHtml(url) {
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.text();
}

async function loadVolume(attempt = 0) {
    if (attempt > 8) throw new Error("Trop de tentatives");

    setLoad('🎲 Tirage du tome...', 20);

    const num = Math.floor(Math.random() * MAX_VOLUME) + 1;
    const url = `https://sushiscan.fr/bleach-volume-${num}/`;

    let html;
    try { html = await fetchHtml(url); } catch { return loadVolume(attempt + 1); }

    const match = html.match(/ts_reader\.run\((.+?)\)\s*;/s);
    if (!match) return loadVolume(attempt + 1);

    let data;
    try { data = JSON.parse(match[1]); } catch { return loadVolume(attempt + 1); }

    const images = data?.sources?.[0]?.images;
    if (!images?.length) return loadVolume(attempt + 1);

    const pageIndex = Math.floor(Math.random() * (images.length - 1)) + 1;
    const imgUrl = images[pageIndex];

    setLoad('🖼 Chargement image...', 70);

    await new Promise((resolve, reject) => {
        const img = $('mangaImg');
        img.onload = resolve;
        img.onerror = reject;
        img.src = imgUrl;
        setTimeout(reject, 10000);
    });

    target = { num, imgUrl };
    round++;

    $('loadBox').style.display = 'none';
    $('imgBox').style.display = 'block';
    $('inputBox').style.display = 'flex';
    updStats();
}

function submit() {
    if (over || !target) return;

    const raw = parseInt($('chapInput').value);
    if (isNaN(raw) || raw < 1 || raw > MAX_VOLUME) return;

    const diff = Math.abs(raw - target.num);
    const res = diff === 0 ? 'correct' : diff <= CLOSE_MARGIN ? 'close' : 'wrong';
    const arr = raw < target.num ? "▲ plus tard" : "▼ plus tôt";

    tries.push({ result: res });

    const item = document.createElement('div');
    item.className = 'hist-item ' + res;
    item.innerHTML = `<span>Tome ${raw}</span> <span>${res === 'correct' ? '✅' : arr}</span>`;
    $('histBox').appendChild(item);

    updTries();
    $('chapInput').value = '';

    if (res === 'correct' || tries.length >= MAX_TRIES) {
        over = true;

        if (res === 'correct') {
            score += 100; streak++;
            if (streak > best) best = streak;
        } else {
            streak = 0;
        }

        localStorage.setItem('bqc_v1', JSON.stringify({ score, best }));

        $('result').style.display = 'flex';
        $('resTtl').textContent = res === 'correct' ? '🎉 BIEN JOUÉ !' : '💀 PERDU !';
        $('resChap').textContent = "C'était le tome " + target.num;

        updStats();
    }
}

function setLoad(m, p) {
    $('loadMsg').textContent = m;
    $('progFill').style.width = p + '%';
}

function updTries() {
    $('triesRow').innerHTML = '';
    for (let i = 0; i < MAX_TRIES; i++) {
        const d = document.createElement('div');
        d.className = 'try-dot' + (i < tries.length ? ' ' + tries[i].result : '');
        $('triesRow').appendChild(d);
    }
}

function updStats() {
    $('sScore').textContent  = score;
    $('sStreak').textContent = streak;
    $('sBest').textContent   = best;
    $('sRound').textContent  = round;
}
</script>
</body>
</html>
